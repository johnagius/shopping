name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck & build
        run: npm run build

      - name: Bootstrap D1 database id
        run: |
          set -euo pipefail
          echo "Looking up D1 database 'shopping'…"
          DB_ID="$(npx wrangler d1 list --json 2>/dev/null \
            | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{try{const a=JSON.parse(d);const m=(Array.isArray(a)?a:[]).find(x=>x.name==="shopping");process.stdout.write(m?(m.uuid||m.database_id||""):"")}catch{process.stdout.write("")}})')"
          if [ -z "$DB_ID" ]; then
            echo "Not found — creating it…"
            CREATE_OUT="$(npx wrangler d1 create shopping || true)"
            echo "$CREATE_OUT"
            DB_ID="$(printf '%s' "$CREATE_OUT" | grep -oiE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)"
          fi
          if [ -z "$DB_ID" ]; then
            echo "::error::Could not determine D1 database id"; exit 1
          fi
          echo "Using D1 database id: $DB_ID"
          sed -i "s/PLACEHOLDER_DATABASE_ID/$DB_ID/" wrangler.toml

      - name: Apply database migrations
        run: npx wrangler d1 migrations apply shopping --remote

      - name: Deploy Worker
        run: npx wrangler deploy
